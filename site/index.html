<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex CLI Wiki</title>
    <meta name="description" content="Codex CLI Wiki — structured documentation with search and navigation for Codex CLI workflows." />
    <meta name="theme-color" content="#0d9488" />
    <link rel="icon" type="image/png" href="./assets/logo.png" />
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-panel">
          <div class="brand">
            <img src="./assets/logo.png" alt="Codex" class="brand-logo" />
            <div class="brand-text">
              <span class="eyebrow" id="brandEyebrow">Documentation Hub</span>
              <h1 id="brandName">Codex CLI Wiki</h1>
            </div>
          </div>

          <div class="lang-dropdown" id="langDropdown">
            <button class="lang-current" id="langCurrent" type="button">
              <span id="langCurrentLabel">English</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="m6 9 6 6 6-6"/>
              </svg>
            </button>
            <div class="lang-menu" id="langMenu"></div>
          </div>

          <button class="mobile-toggle" id="mobileToggle" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M3 12h18M3 6h18M3 18h18"/>
            </svg>
            <span id="mobileToggleText">Sections</span>
          </button>

          <div class="search-section">
            <span class="search-label" id="searchLabel">Search</span>
            <div class="search-input-wrap">
              <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <circle cx="11" cy="11" r="8"/>
                <path d="m21 21-4.3-4.3"/>
              </svg>
              <input
                id="searchInput"
                type="search"
                class="search-input"
                placeholder="Search documentation..."
                autocomplete="off"
              />
            </div>
          </div>

          <div class="filters" id="filters"></div>
          <div class="search-results hidden" id="searchResults"></div>

          <nav class="nav-tree" id="navTree"></nav>

          <div class="sidebar-footer">
            <a href="https://github.com/milord-x/Codex-CLI-Wiki" target="_blank" rel="noreferrer">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
              </svg>
              GitHub
            </a>
            <button class="theme-toggle" id="themeToggle" type="button">
              <svg id="themeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
              <span id="themeLabel">Dark mode</span>
            </button>
          </div>
        </div>
      </aside>

      <main class="content-area">
        <header class="page-toolbar">
          <div class="toolbar-copy">
            <span class="eyebrow" id="pageEyebrow">Documentation</span>
            <span id="pageBreadcrumb" style="font-size: 13px; font-weight: 500; color: var(--text-primary);"></span>
          </div>
          <div class="toolbar-actions">
            <button class="ghost-btn" id="homeButton" type="button">Home</button>
            <button class="ghost-btn" id="copyLinkButton" type="button">Copy link</button>
          </div>
        </header>

        <article class="doc-card" id="docCard">
          <div class="doc-header" id="docHeader"></div>
          <div class="doc-content" id="docContent"></div>
        </article>
      </main>

      <aside class="toc-panel">
        <div class="toc-card">
          <span class="eyebrow" id="tocEyebrow">On this page</span>
          <div class="toc-list" id="tocList"></div>
          <div class="toc-meta" id="tocMeta"></div>
        </div>
      </aside>
    </div>

    <script src="./data/content.js"></script>
    <script src="./assets/app.js"></script>
  </body>
</html>
